<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <!-- Loop arc gradient -->
    <linearGradient id="arc1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7ee787" stop-opacity="0" />
      <stop offset="50%" stop-color="#7ee787" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#79c0ff" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="arc2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#79c0ff" stop-opacity="0" />
      <stop offset="50%" stop-color="#f0883e" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#f0883e" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="arc3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0883e" stop-opacity="0" />
      <stop offset="50%" stop-color="#d2a8ff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#7ee787" stop-opacity="0" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Node glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ee787" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#7ee787" stop-opacity="0" />
    </radialGradient>
  </defs>

  <style>
    @keyframes orbit1 {
      0%   { stroke-dashoffset: 220 }
      100% { stroke-dashoffset: 0 }
    }
    @keyframes orbit2 {
      0%   { stroke-dashoffset: 280 }
      100% { stroke-dashoffset: 0 }
    }
    @keyframes orbit3 {
      0%   { stroke-dashoffset: 340 }
      100% { stroke-dashoffset: 0 }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; r: 4 }
      50%      { opacity: 1; r: 6 }
    }
    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(8px) }
      100% { opacity: 1; transform: translateY(0) }
    }
    .ring1 {
      stroke-dasharray: 30 190;
      animation: orbit1 6s linear infinite;
    }
    .ring2 {
      stroke-dasharray: 40 240;
      animation: orbit2 8s linear infinite;
    }
    .ring3 {
      stroke-dasharray: 25 315;
      animation: orbit3 10s linear infinite;
    }
    .node {
      animation: pulse 3s ease-in-out infinite;
    }
    .node-delay1 { animation-delay: 1s }
    .node-delay2 { animation-delay: 2s }
    .title {
      fill: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-weight: 600;
      font-size: 32px;
      letter-spacing: -0.5px;
    }
    .tagline {
      fill: #8b949e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-weight: 400;
      font-size: 14px;
    }
    .fade1 { animation: fadeUp 0.8s ease both; animation-delay: 0.2s }
    .fade2 { animation: fadeUp 0.8s ease both; animation-delay: 0.5s }
  </style>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#e6edf3" />
    <line x1="0" y1="100" x2="800" y2="100" stroke="#e6edf3" />
    <line x1="0" y1="150" x2="800" y2="150" stroke="#e6edf3" />
    <line x1="200" y1="0" x2="200" y2="200" stroke="#e6edf3" />
    <line x1="400" y1="0" x2="400" y2="200" stroke="#e6edf3" />
    <line x1="600" y1="0" x2="600" y2="200" stroke="#e6edf3" />
  </g>

  <!-- Abstract orbital rings (representing autonomous loop) -->
  <g transform="translate(660, 100)" filter="url(#glow)">
    <!-- Ring 1 — inner -->
    <ellipse class="ring1" cx="0" cy="0" rx="35" ry="35"
      stroke="url(#arc1)" stroke-width="2" fill="none" />
    <!-- Ring 2 — mid, tilted -->
    <ellipse class="ring2" cx="0" cy="0" rx="55" ry="28"
      stroke="url(#arc2)" stroke-width="1.5" fill="none"
      transform="rotate(-25)" />
    <!-- Ring 3 — outer, tilted opposite -->
    <ellipse class="ring3" cx="0" cy="0" rx="72" ry="22"
      stroke="url(#arc3)" stroke-width="1" fill="none"
      transform="rotate(15)" />

    <!-- Center node -->
    <circle cx="0" cy="0" r="16" fill="url(#nodeGlow)" opacity="0.3" />
    <circle class="node" cx="0" cy="0" r="4" fill="#7ee787" />

    <!-- Orbiting nodes -->
    <circle class="node node-delay1" cx="35" cy="0" r="3" fill="#79c0ff" />
    <circle class="node node-delay2" cx="-20" cy="-26" r="2.5" fill="#f0883e" />
  </g>

  <!-- Text content -->
  <g class="fade1">
    <text x="60" y="90" class="title">Claude Code Kit</text>
  </g>
  <g class="fade2">
    <text x="60" y="118" class="tagline">Autonomous coding. Correction learning. Overnight loops.</text>
  </g>
</svg>
