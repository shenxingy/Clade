<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <!-- Sky gradient — deep twilight -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e1a" />
      <stop offset="60%" stop-color="#0d1525" />
      <stop offset="100%" stop-color="#111d2e" />
    </linearGradient>

    <!-- Firefly glow -->
    <radialGradient id="glow-g">
      <stop offset="0%" stop-color="#7ee787" stop-opacity="0.9" />
      <stop offset="40%" stop-color="#7ee787" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#7ee787" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-b">
      <stop offset="0%" stop-color="#79c0ff" stop-opacity="0.7" />
      <stop offset="40%" stop-color="#79c0ff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#79c0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-o">
      <stop offset="0%" stop-color="#f0c060" stop-opacity="0.8" />
      <stop offset="40%" stop-color="#f0c060" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#f0c060" stop-opacity="0" />
    </radialGradient>
    <!-- Kit's glow — larger, warmer -->
    <radialGradient id="glow-kit">
      <stop offset="0%" stop-color="#b8e986" stop-opacity="1" />
      <stop offset="25%" stop-color="#7ee787" stop-opacity="0.5" />
      <stop offset="60%" stop-color="#7ee787" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#7ee787" stop-opacity="0" />
    </radialGradient>

    <!-- Soft blur for distant fireflies -->
    <filter id="soft">
      <feGaussianBlur stdDeviation="1.5" />
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <style>
    /* Breathing animations — staggered phases */
    @keyframes breathe {
      0%, 100% { opacity: 0.3 }
      50%      { opacity: 1 }
    }
    @keyframes breatheSlow {
      0%, 100% { opacity: 0.2 }
      50%      { opacity: 0.8 }
    }
    @keyframes breatheKit {
      0%, 100% { opacity: 0.7 }
      50%      { opacity: 1 }
    }
    @keyframes drift {
      0%, 100% { transform: translateY(0px) }
      50%      { transform: translateY(-3px) }
    }
    @keyframes driftKit {
      0%, 100% { transform: translate(0px, 0px) }
      33%      { transform: translate(2px, -4px) }
      66%      { transform: translate(-1px, -2px) }
    }

    .fly       { animation: breathe 3s ease-in-out infinite }
    .fly-slow  { animation: breatheSlow 5s ease-in-out infinite }
    .fly-kit   { animation: breatheKit 4s ease-in-out infinite }
    .drift     { animation: drift 6s ease-in-out infinite }
    .drift-kit { animation: driftKit 8s ease-in-out infinite }

    .d1 { animation-delay: 0s }
    .d2 { animation-delay: 0.5s }
    .d3 { animation-delay: 1.0s }
    .d4 { animation-delay: 1.5s }
    .d5 { animation-delay: 2.0s }
    .d6 { animation-delay: 2.5s }
    .d7 { animation-delay: 3.0s }
    .d8 { animation-delay: 3.5s }
    .d9 { animation-delay: 0.8s }
    .d10 { animation-delay: 1.3s }
    .d11 { animation-delay: 1.8s }
    .d12 { animation-delay: 2.3s }

    .title {
      fill: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-weight: 600;
      font-size: 28px;
      letter-spacing: -0.3px;
    }
    .tagline {
      fill: #6e7681;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 2px;
    }
  </style>

  <!-- Night sky -->
  <rect width="800" height="200" fill="url(#sky)" />

  <!-- Distant stars — tiny, static -->
  <g opacity="0.15">
    <circle cx="120" cy="18" r="0.5" fill="#fff" />
    <circle cx="245" cy="35" r="0.4" fill="#fff" />
    <circle cx="380" cy="12" r="0.5" fill="#fff" />
    <circle cx="510" cy="28" r="0.3" fill="#fff" />
    <circle cx="620" cy="8" r="0.5" fill="#fff" />
    <circle cx="710" cy="42" r="0.4" fill="#fff" />
    <circle cx="55" cy="45" r="0.3" fill="#fff" />
    <circle cx="460" cy="48" r="0.4" fill="#fff" />
    <circle cx="170" cy="52" r="0.3" fill="#fff" />
    <circle cx="340" cy="22" r="0.4" fill="#fff" />
    <circle cx="770" cy="15" r="0.3" fill="#fff" />
    <circle cx="680" cy="55" r="0.5" fill="#fff" />
  </g>

  <!-- Treeline silhouette — very subtle -->
  <path d="M0,185 Q30,170 50,178 Q70,165 90,175 Q120,158 150,172 Q170,162 200,170 Q230,155 260,168 Q290,158 320,165 Q350,150 380,163 Q410,155 440,162 Q470,148 500,160 Q530,152 560,158 Q590,145 620,156 Q650,148 680,155 Q710,142 740,152 Q770,145 800,150 L800,200 L0,200 Z"
    fill="#080c16" opacity="0.6" />

  <!-- === FIREFLIES === -->

  <!-- Background fireflies — distant, blurred, blue-ish -->
  <g filter="url(#softer)">
    <circle class="fly-slow d1" cx="95" cy="78" r="6" fill="url(#glow-b)" />
    <circle class="fly-slow d3" cx="720" cy="92" r="5" fill="url(#glow-b)" />
    <circle class="fly-slow d5" cx="380" cy="65" r="4" fill="url(#glow-b)" />
    <circle class="fly-slow d7" cx="560" cy="110" r="5" fill="url(#glow-b)" />
    <circle class="fly-slow d9" cx="200" cy="130" r="4" fill="url(#glow-b)" />
  </g>

  <!-- Mid-ground fireflies — green -->
  <g filter="url(#soft)">
    <g class="drift d2">
      <circle class="fly d2" cx="155" cy="95" r="8" fill="url(#glow-g)" />
      <circle cx="155" cy="95" r="1.5" fill="#7ee787" opacity="0.9" />
    </g>
    <g class="drift d4">
      <circle class="fly d4" cx="310" cy="120" r="7" fill="url(#glow-g)" />
      <circle cx="310" cy="120" r="1.2" fill="#7ee787" opacity="0.8" />
    </g>
    <g class="drift d6">
      <circle class="fly d6" cx="480" cy="80" r="9" fill="url(#glow-g)" />
      <circle cx="480" cy="80" r="1.5" fill="#7ee787" opacity="0.9" />
    </g>
    <g class="drift d8">
      <circle class="fly d8" cx="640" cy="135" r="7" fill="url(#glow-g)" />
      <circle cx="640" cy="135" r="1.2" fill="#7ee787" opacity="0.8" />
    </g>
    <g class="drift d10">
      <circle class="fly d10" cx="750" cy="70" r="6" fill="url(#glow-g)" />
      <circle cx="750" cy="70" r="1" fill="#7ee787" opacity="0.7" />
    </g>
  </g>

  <!-- Warm accent fireflies — orange/gold, fewer -->
  <g filter="url(#soft)">
    <g class="drift d3">
      <circle class="fly d3" cx="430" cy="140" r="6" fill="url(#glow-o)" />
      <circle cx="430" cy="140" r="1" fill="#f0c060" opacity="0.8" />
    </g>
    <g class="drift d11">
      <circle class="fly d11" cx="260" cy="70" r="5" fill="url(#glow-o)" />
      <circle cx="260" cy="70" r="0.8" fill="#f0c060" opacity="0.7" />
    </g>
  </g>

  <!-- Foreground fireflies — bright, close -->
  <g class="drift d1">
    <circle class="fly d1" cx="68" cy="135" r="10" fill="url(#glow-g)" />
    <circle cx="68" cy="135" r="2" fill="#b8e986" />
  </g>
  <g class="drift d12">
    <circle class="fly d12" cx="590" cy="60" r="11" fill="url(#glow-g)" />
    <circle cx="590" cy="60" r="2" fill="#b8e986" />
  </g>

  <!-- === KIT — the lead firefly === -->
  <g class="drift-kit" transform="translate(680, 88)">
    <!-- Outer glow -->
    <circle class="fly-kit" cx="0" cy="0" r="22" fill="url(#glow-kit)" />
    <!-- Inner glow -->
    <circle cx="0" cy="0" r="8" fill="#7ee787" opacity="0.15" />
    <!-- Core -->
    <circle cx="0" cy="0" r="3.5" fill="#b8e986" />
    <!-- Bright center -->
    <circle cx="-0.5" cy="-0.5" r="1.5" fill="#e8ffd0" opacity="0.9" />
  </g>

  <!-- Text — positioned in the clear area -->
  <text x="400" y="170" text-anchor="middle" class="title">Claude Code Kit</text>
  <text x="400" y="190" text-anchor="middle" class="tagline">AUTONOMOUS CODING FOR EVERYONE</text>
</svg>
