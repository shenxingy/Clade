<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <!-- Background -->
  <rect width="800" height="200" fill="#0d1117" />

  <!-- === CLADOGRAM (right side, proper right-angle branching) === -->
  <g transform="translate(480, 100)" stroke-linecap="round">
    <!-- Root -->
    <circle cx="0" cy="0" r="3.5" fill="#e6edf3" />

    <!-- Trunk -->
    <line x1="3.5" y1="0" x2="30" y2="0" stroke="#e6edf3" stroke-width="1.8" opacity="0.4" />

    <!-- First split vertical -->
    <line x1="30" y1="-55" x2="30" y2="55" stroke="#e6edf3" stroke-width="1.5" opacity="0.3" />

    <!-- ═══ UPPER (hooks + skills) ═══ -->
    <line x1="30" y1="-55" x2="80" y2="-55" stroke="#e6edf3" stroke-width="1.5" opacity="0.3" />
    <!-- Second split -->
    <line x1="80" y1="-80" x2="80" y2="-25" stroke="#e6edf3" stroke-width="1.2" opacity="0.25" />

    <!-- hooks (green) -->
    <line x1="80" y1="-80" x2="140" y2="-80" stroke="#7ee787" stroke-width="1.5" opacity="0.6" />
    <circle cx="140" cy="-80" r="2.8" fill="#7ee787" />
    <line x1="140" y1="-90" x2="140" y2="-70" stroke="#7ee787" stroke-width="1" opacity="0.35" />
    <line x1="140" y1="-90" x2="195" y2="-90" stroke="#7ee787" stroke-width="0.8" opacity="0.3" />
    <circle cx="195" cy="-90" r="1.5" fill="#7ee787" opacity="0.6" />
    <line x1="140" y1="-80" x2="195" y2="-80" stroke="#7ee787" stroke-width="0.8" opacity="0.3" />
    <circle cx="195" cy="-80" r="1.2" fill="#7ee787" opacity="0.45" />
    <line x1="140" y1="-70" x2="195" y2="-70" stroke="#7ee787" stroke-width="0.8" opacity="0.3" />
    <circle cx="195" cy="-70" r="1" fill="#7ee787" opacity="0.35" />

    <!-- skills (blue) -->
    <line x1="80" y1="-25" x2="140" y2="-25" stroke="#79c0ff" stroke-width="1.5" opacity="0.55" />
    <circle cx="140" cy="-25" r="3.2" fill="#79c0ff" />
    <line x1="140" y1="-40" x2="140" y2="-10" stroke="#79c0ff" stroke-width="1" opacity="0.3" />
    <line x1="140" y1="-40" x2="205" y2="-40" stroke="#79c0ff" stroke-width="0.8" opacity="0.25" />
    <circle cx="205" cy="-40" r="1.5" fill="#79c0ff" opacity="0.55" />
    <line x1="140" y1="-25" x2="205" y2="-25" stroke="#79c0ff" stroke-width="0.8" opacity="0.25" />
    <circle cx="205" cy="-25" r="1.2" fill="#79c0ff" opacity="0.45" />
    <line x1="140" y1="-10" x2="205" y2="-10" stroke="#79c0ff" stroke-width="0.8" opacity="0.25" />
    <circle cx="205" cy="-10" r="1" fill="#79c0ff" opacity="0.35" />

    <!-- ═══ LOWER (agents + orchestrator) ═══ -->
    <line x1="30" y1="55" x2="80" y2="55" stroke="#e6edf3" stroke-width="1.5" opacity="0.3" />
    <!-- Third split -->
    <line x1="80" y1="30" x2="80" y2="78" stroke="#e6edf3" stroke-width="1.2" opacity="0.25" />

    <!-- agents (orange) -->
    <line x1="80" y1="30" x2="140" y2="30" stroke="#f0883e" stroke-width="1.5" opacity="0.5" />
    <circle cx="140" cy="30" r="2.5" fill="#f0883e" />
    <line x1="140" y1="22" x2="140" y2="40" stroke="#f0883e" stroke-width="1" opacity="0.3" />
    <line x1="140" y1="22" x2="195" y2="22" stroke="#f0883e" stroke-width="0.8" opacity="0.25" />
    <circle cx="195" cy="22" r="1.2" fill="#f0883e" opacity="0.5" />
    <line x1="140" y1="40" x2="195" y2="40" stroke="#f0883e" stroke-width="0.8" opacity="0.25" />
    <circle cx="195" cy="40" r="1" fill="#f0883e" opacity="0.35" />

    <!-- orchestrator (purple) -->
    <line x1="80" y1="78" x2="140" y2="78" stroke="#d2a8ff" stroke-width="1.3" opacity="0.4" />
    <circle cx="140" cy="78" r="2.2" fill="#d2a8ff" />
    <line x1="140" y1="70" x2="140" y2="86" stroke="#d2a8ff" stroke-width="0.8" opacity="0.25" />
    <line x1="140" y1="70" x2="195" y2="70" stroke="#d2a8ff" stroke-width="0.7" opacity="0.2" />
    <circle cx="195" cy="70" r="1" fill="#d2a8ff" opacity="0.35" />
    <line x1="140" y1="86" x2="195" y2="86" stroke="#d2a8ff" stroke-width="0.7" opacity="0.2" />
    <circle cx="195" cy="86" r="1" fill="#d2a8ff" opacity="0.3" />
  </g>

  <!-- Text -->
  <text x="60" y="90" fill="#e6edf3" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="42" letter-spacing="-0.5">Clade</text>
  <text x="62" y="118" fill="#8b949e" font-family="Helvetica, Arial, sans-serif" font-weight="400" font-size="14" letter-spacing="2">AUTONOMOUS CODING, EVOLVED</text>
</svg>
