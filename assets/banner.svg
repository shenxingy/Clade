<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" fill="none">
  <style>
    @keyframes typing1 {
      0%, 15% { width: 0 }
      35%, 100% { width: 480px }
    }
    @keyframes typing2 {
      0%, 40% { width: 0 }
      60%, 100% { width: 700px }
    }
    @keyframes blink {
      0%, 49% { opacity: 1 }
      50%, 100% { opacity: 0 }
    }
    @keyframes fadeIn {
      0%, 65% { opacity: 0 }
      80%, 100% { opacity: 1 }
    }
    @keyframes cursorMove {
      0%, 15%  { transform: translate(32px, 88px) }
      35%, 40% { transform: translate(512px, 88px) }
      60%      { transform: translate(732px, 138px) }
      65%, 100%{ transform: translate(0px, 0px); opacity: 0 }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.6 }
      50% { opacity: 1 }
    }
    .terminal-bg { fill: #0d1117; rx: 12; }
    .titlebar { fill: #161b22; }
    .btn-close { fill: #f85149; }
    .btn-min { fill: #f0c541; }
    .btn-max { fill: #56d364; }
    .prompt { fill: #7ee787; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; }
    .command { fill: #e6edf3; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; }
    .comment { fill: #8b949e; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; }
    .accent { fill: #79c0ff; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; }
    .title-text { fill: #f0883e; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; font-weight: bold; }
    .cursor {
      fill: #e6edf3;
      animation: blink 1s step-end infinite;
    }
    .line1-mask {
      animation: typing1 4s steps(30, end) forwards;
      animation-iteration-count: 1;
    }
    .line2-mask {
      animation: typing2 4s steps(40, end) forwards;
      animation-iteration-count: 1;
    }
    .features {
      animation: fadeIn 4s ease forwards;
      animation-iteration-count: 1;
    }
    .glow {
      animation: glowPulse 3s ease-in-out infinite;
    }
  </style>

  <!-- Terminal window -->
  <rect class="terminal-bg" width="800" height="280" />

  <!-- Title bar -->
  <rect class="titlebar" width="800" height="36" rx="12" />
  <rect class="titlebar" width="800" height="12" y="24" />

  <!-- Window buttons -->
  <circle class="btn-close" cx="20" cy="18" r="6" />
  <circle class="btn-min" cx="40" cy="18" r="6" />
  <circle class="btn-max" cx="60" cy="18" r="6" />

  <!-- Title bar text -->
  <text x="400" y="22" text-anchor="middle" class="comment" font-size="12">claude-code-kit</text>

  <!-- Line 1: ASCII title with typing effect -->
  <g>
    <clipPath id="clip1">
      <rect x="28" y="50" height="50" class="line1-mask" />
    </clipPath>
    <g clip-path="url(#clip1)">
      <text x="32" y="72" class="prompt" font-size="14">$</text>
      <text x="52" y="72" class="title-text" font-size="28" letter-spacing="2">Claude Code Kit</text>
    </g>
  </g>

  <!-- Line 2: tagline with typing effect -->
  <g>
    <clipPath id="clip2">
      <rect x="28" y="95" height="50" class="line2-mask" />
    </clipPath>
    <g clip-path="url(#clip2)">
      <text x="32" y="115" class="prompt" font-size="14">#</text>
      <text x="52" y="115" class="comment" font-size="15">Turn Claude Code from a chat assistant into an autonomous coding system</text>
    </g>
  </g>

  <!-- Cursor -->
  <rect class="cursor" x="52" y="124" width="8" height="18" />

  <!-- Feature pills - fade in after typing -->
  <g class="features">
    <!-- Divider line -->
    <line x1="32" y1="155" x2="768" y2="155" stroke="#30363d" stroke-width="1" />

    <!-- Feature items -->
    <text x="32" y="180" class="accent" font-size="13">10 hooks</text>
    <text x="120" y="180" class="comment" font-size="13">|</text>
    <text x="138" y="180" class="accent" font-size="13">5 agents</text>
    <text x="224" y="180" class="comment" font-size="13">|</text>
    <text x="242" y="180" class="accent" font-size="13">23 skills</text>
    <text x="340" y="180" class="comment" font-size="13">|</text>
    <text x="358" y="180" class="accent" font-size="13">safety guardian</text>
    <text x="508" y="180" class="comment" font-size="13">|</text>
    <text x="526" y="180" class="accent" font-size="13">correction learning</text>

    <!-- Bottom tagline -->
    <text x="32" y="210" class="prompt" font-size="13">></text>
    <text x="50" y="210" class="command" font-size="13">./install.sh</text>
    <text x="170" y="210" class="comment" font-size="13">  # one command. autonomous overnight coding.</text>

    <!-- Swarm indicator -->
    <g class="glow">
      <circle cx="32" cy="242" r="4" fill="#56d364" />
    </g>
    <text x="44" y="246" class="comment" font-size="12">swarm: 4 workers active</text>
    <text x="240" y="246" class="comment" font-size="12">|</text>
    <text x="256" y="246" class="comment" font-size="12">tasks: 12/15 complete</text>
    <text x="440" y="246" class="comment" font-size="12">|</text>
    <text x="456" y="246" class="comment" font-size="12">corrections: 3 learned</text>
    <text x="650" y="246" class="comment" font-size="12">|</text>
    <text x="666" y="246" class="comment" font-size="12">cost: $2.14</text>
  </g>
</svg>
