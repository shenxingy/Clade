<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0d1117" />

  <!-- === CLADOGRAM (right side, compact) === -->
  <g transform="translate(820, 300)">
    <!-- Root -->
    <circle cx="0" cy="0" r="6" fill="#e6edf3" />

    <!-- Trunk -->
    <line x1="6" y1="0" x2="45" y2="0" stroke="#7ee787" stroke-width="2.5" opacity="0.5" />

    <!-- Branch: hooks (up-right, green) -->
    <line x1="45" y1="0" x2="130" y2="-75" stroke="#7ee787" stroke-width="2" opacity="0.55" />
    <circle cx="130" cy="-75" r="4" fill="#7ee787" />
    <line x1="130" y1="-75" x2="195" y2="-105" stroke="#7ee787" stroke-width="1.2" opacity="0.3" />
    <circle cx="195" cy="-105" r="2.5" fill="#7ee787" opacity="0.7" />
    <line x1="130" y1="-75" x2="200" y2="-65" stroke="#7ee787" stroke-width="1" opacity="0.25" />
    <circle cx="200" cy="-65" r="1.8" fill="#7ee787" opacity="0.5" />
    <line x1="195" y1="-105" x2="250" y2="-120" stroke="#7ee787" stroke-width="0.7" opacity="0.18" />
    <circle cx="250" cy="-120" r="1.2" fill="#7ee787" opacity="0.35" />

    <!-- Branch: skills (right, blue) — largest -->
    <line x1="45" y1="0" x2="155" y2="15" stroke="#79c0ff" stroke-width="2" opacity="0.5" />
    <circle cx="155" cy="15" r="5" fill="#79c0ff" />
    <line x1="155" y1="15" x2="230" y2="-10" stroke="#79c0ff" stroke-width="1.2" opacity="0.3" />
    <circle cx="230" cy="-10" r="2.2" fill="#79c0ff" opacity="0.6" />
    <line x1="155" y1="15" x2="235" y2="35" stroke="#79c0ff" stroke-width="1.2" opacity="0.25" />
    <circle cx="235" cy="35" r="2" fill="#79c0ff" opacity="0.5" />
    <line x1="155" y1="15" x2="220" y2="55" stroke="#79c0ff" stroke-width="1" opacity="0.2" />
    <circle cx="220" cy="55" r="1.5" fill="#79c0ff" opacity="0.4" />
    <line x1="230" y1="-10" x2="300" y2="-22" stroke="#79c0ff" stroke-width="0.7" opacity="0.15" />
    <circle cx="300" cy="-22" r="1.2" fill="#79c0ff" opacity="0.3" />

    <!-- Branch: agents (down-right, orange) -->
    <line x1="45" y1="0" x2="140" y2="85" stroke="#f0883e" stroke-width="1.8" opacity="0.45" />
    <circle cx="140" cy="85" r="3.5" fill="#f0883e" />
    <line x1="140" y1="85" x2="215" y2="100" stroke="#f0883e" stroke-width="1" opacity="0.25" />
    <circle cx="215" cy="100" r="2" fill="#f0883e" opacity="0.55" />
    <line x1="140" y1="85" x2="195" y2="125" stroke="#f0883e" stroke-width="0.7" opacity="0.18" />
    <circle cx="195" cy="125" r="1.3" fill="#f0883e" opacity="0.35" />

    <!-- Branch: orchestrator (down, purple) -->
    <line x1="45" y1="0" x2="105" y2="115" stroke="#d2a8ff" stroke-width="1.5" opacity="0.35" />
    <circle cx="105" cy="115" r="3" fill="#d2a8ff" />
    <line x1="105" y1="115" x2="160" y2="145" stroke="#d2a8ff" stroke-width="0.7" opacity="0.18" />
    <circle cx="160" cy="145" r="1.3" fill="#d2a8ff" opacity="0.35" />

    <!-- Branch: scripts (upper fork) -->
    <line x1="25" y1="0" x2="65" y2="-45" stroke="#7ee787" stroke-width="1" opacity="0.2" />
    <circle cx="65" cy="-45" r="1.5" fill="#7ee787" opacity="0.35" />
  </g>

  <!-- Title -->
  <text x="100" y="235" fill="#e6edf3" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="76" letter-spacing="-1.5">Clade</text>

  <!-- Tagline -->
  <text x="104" y="290" fill="#8b949e" font-family="Helvetica, Arial, sans-serif" font-weight="400" font-size="22" letter-spacing="3">AUTONOMOUS CODING, EVOLVED</text>

  <!-- Stats row -->
  <circle cx="110" cy="348" r="5" fill="#79c0ff" />
  <text x="124" y="354" fill="#79c0ff" font-family="Helvetica, Arial, sans-serif" font-weight="600" font-size="19">29 Skills</text>

  <circle cx="268" cy="348" r="5" fill="#7ee787" />
  <text x="282" y="354" fill="#7ee787" font-family="Helvetica, Arial, sans-serif" font-weight="600" font-size="19">14 Hooks</text>

  <circle cx="418" cy="348" r="5" fill="#f0883e" />
  <text x="432" y="354" fill="#f0883e" font-family="Helvetica, Arial, sans-serif" font-weight="600" font-size="19">5 Agents</text>

  <circle cx="558" cy="348" r="5" fill="#d2a8ff" />
  <text x="572" y="354" fill="#d2a8ff" font-family="Helvetica, Arial, sans-serif" font-weight="600" font-size="19">MCP Server</text>

  <!-- Install box -->
  <rect x="100" y="390" width="400" height="46" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1" />
  <text x="120" y="420" fill="#8b949e" font-family="Consolas, 'Liberation Mono', monospace" font-size="16">$</text>
  <text x="140" y="420" fill="#c9d1d9" font-family="Consolas, 'Liberation Mono', monospace" font-size="16">pip install clade-mcp</text>

  <!-- Bottom tagline -->
  <text x="100" y="490" fill="#484f58" font-family="Helvetica, Arial, sans-serif" font-weight="400" font-size="16">Turn Claude Code from a chat assistant into an autonomous coding system</text>
</svg>
