<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <filter id="soft">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>

  <!-- Solid dark background -->
  <rect width="1280" height="640" fill="#0d1117" />

  <!-- Subtle grid -->
  <g opacity="0.018">
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#e6edf3" />
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#e6edf3" />
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#e6edf3" />
    <line x1="320" y1="0" x2="320" y2="640" stroke="#e6edf3" />
    <line x1="640" y1="0" x2="640" y2="640" stroke="#e6edf3" />
    <line x1="960" y1="0" x2="960" y2="640" stroke="#e6edf3" />
  </g>

  <!-- === CLADOGRAM === -->
  <g transform="translate(780, 310)">
    <!-- Root -->
    <circle cx="0" cy="0" r="12" fill="#7ee787" opacity="0.08" />
    <circle cx="0" cy="0" r="5" fill="#e6edf3" />

    <!-- Main trunk -->
    <line x1="5" y1="0" x2="60" y2="0" stroke="#7ee787" stroke-width="2" opacity="0.5" />

    <!-- Branch 1: hooks (up-right, green) -->
    <line x1="60" y1="0" x2="160" y2="-90" stroke="#7ee787" stroke-width="2" opacity="0.6" />
    <circle cx="160" cy="-90" r="10" fill="#7ee787" opacity="0.15" />
    <circle cx="160" cy="-90" r="3.5" fill="#7ee787" />
    <line x1="160" y1="-90" x2="240" y2="-130" stroke="#7ee787" stroke-width="1" opacity="0.3" />
    <circle cx="240" cy="-130" r="6" fill="#7ee787" opacity="0.1" />
    <circle cx="240" cy="-130" r="2" fill="#7ee787" opacity="0.7" />
    <line x1="160" y1="-90" x2="250" y2="-70" stroke="#7ee787" stroke-width="1" opacity="0.25" />
    <circle cx="250" cy="-70" r="4" fill="#7ee787" opacity="0.08" />
    <circle cx="250" cy="-70" r="1.5" fill="#7ee787" opacity="0.6" />
    <line x1="240" y1="-130" x2="310" y2="-150" stroke="#7ee787" stroke-width="0.6" opacity="0.15" />
    <circle cx="310" cy="-150" r="1" fill="#7ee787" opacity="0.4" />

    <!-- Branch 2: skills (right, blue) -->
    <line x1="60" y1="0" x2="190" y2="20" stroke="#79c0ff" stroke-width="2" opacity="0.55" />
    <circle cx="190" cy="20" r="12" fill="#79c0ff" opacity="0.15" />
    <circle cx="190" cy="20" r="4" fill="#79c0ff" />
    <line x1="190" y1="20" x2="280" y2="-10" stroke="#79c0ff" stroke-width="1" opacity="0.3" />
    <circle cx="280" cy="-10" r="5" fill="#79c0ff" opacity="0.1" />
    <circle cx="280" cy="-10" r="1.8" fill="#79c0ff" opacity="0.6" />
    <line x1="190" y1="20" x2="290" y2="45" stroke="#79c0ff" stroke-width="1" opacity="0.25" />
    <circle cx="290" cy="45" r="4" fill="#79c0ff" opacity="0.08" />
    <circle cx="290" cy="45" r="1.5" fill="#79c0ff" opacity="0.5" />
    <line x1="190" y1="20" x2="270" y2="70" stroke="#79c0ff" stroke-width="1" opacity="0.2" />
    <circle cx="270" cy="70" r="3.5" fill="#79c0ff" opacity="0.08" />
    <circle cx="270" cy="70" r="1.2" fill="#79c0ff" opacity="0.4" />
    <line x1="280" y1="-10" x2="360" y2="-25" stroke="#79c0ff" stroke-width="0.6" opacity="0.15" />
    <circle cx="360" cy="-25" r="1" fill="#79c0ff" opacity="0.35" />

    <!-- Branch 3: agents (down-right, orange) -->
    <line x1="60" y1="0" x2="170" y2="100" stroke="#f0883e" stroke-width="1.8" opacity="0.5" />
    <circle cx="170" cy="100" r="9" fill="#f0883e" opacity="0.12" />
    <circle cx="170" cy="100" r="3" fill="#f0883e" />
    <line x1="170" y1="100" x2="260" y2="120" stroke="#f0883e" stroke-width="1" opacity="0.25" />
    <circle cx="260" cy="120" r="5" fill="#f0883e" opacity="0.1" />
    <circle cx="260" cy="120" r="1.8" fill="#f0883e" opacity="0.6" />
    <line x1="170" y1="100" x2="240" y2="155" stroke="#f0883e" stroke-width="0.6" opacity="0.15" />
    <circle cx="240" cy="155" r="1.2" fill="#f0883e" opacity="0.4" />

    <!-- Branch 4: orchestrator (far down, purple) -->
    <line x1="60" y1="0" x2="130" y2="140" stroke="#d2a8ff" stroke-width="1.5" opacity="0.4" />
    <circle cx="130" cy="140" r="7" fill="#d2a8ff" opacity="0.1" />
    <circle cx="130" cy="140" r="2.5" fill="#d2a8ff" />
    <line x1="130" y1="140" x2="200" y2="175" stroke="#d2a8ff" stroke-width="0.6" opacity="0.15" />
    <circle cx="200" cy="175" r="1.2" fill="#d2a8ff" opacity="0.4" />

    <!-- Branch 5: scripts (upper trunk) -->
    <line x1="30" y1="0" x2="80" y2="-55" stroke="#7ee787" stroke-width="1" opacity="0.2" />
    <circle cx="80" cy="-55" r="1.2" fill="#7ee787" opacity="0.4" />
  </g>

  <!-- Title -->
  <text x="100" y="245" fill="#e6edf3" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="700" font-size="72" letter-spacing="-1">Clade</text>

  <!-- Tagline -->
  <text x="103" y="305" fill="#6e7681" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="400" font-size="24" letter-spacing="2">AUTONOMOUS CODING, EVOLVED</text>

  <!-- Stats row -->
  <circle cx="108" cy="358" r="5" fill="#79c0ff" opacity="0.8" />
  <text x="122" y="364" fill="#79c0ff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" font-size="20">29 Skills</text>

  <circle cx="268" cy="358" r="5" fill="#7ee787" opacity="0.8" />
  <text x="282" y="364" fill="#7ee787" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" font-size="20">14 Hooks</text>

  <circle cx="428" cy="358" r="5" fill="#f0883e" opacity="0.8" />
  <text x="442" y="364" fill="#f0883e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" font-size="20">5 Agents</text>

  <circle cx="568" cy="358" r="5" fill="#d2a8ff" opacity="0.8" />
  <text x="582" y="364" fill="#d2a8ff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" font-size="20">MCP Server</text>

  <!-- Install box -->
  <rect x="100" y="400" width="420" height="48" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1" />
  <text x="122" y="430" fill="#8b949e" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="17">$</text>
  <text x="145" y="430" fill="#c9d1d9" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="17">pip install clade-mcp</text>

  <!-- Bottom tagline -->
  <text x="100" y="520" fill="#484f58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="400" font-size="17">Turn Claude Code from a chat assistant into an autonomous coding system</text>
</svg>
