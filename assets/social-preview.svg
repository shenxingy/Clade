<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0d1117" />

  <!-- === CLADOGRAM (right side, proper right-angle branching) === -->
  <!--
    Structure:
    root ──┬── upper ──┬── hooks ──┬── h1
           │           │           └── h2
           │           │
           │           └── skills ──┬── s1
           │                        ├── s2
           │                        └── s3
           │
           └── lower ──┬── agents ──┬── a1
                       │            └── a2
                       │
                       └── orchestrator ── o1
  -->
  <g transform="translate(720, 295)" stroke-linecap="round">
    <!-- Root node -->
    <circle cx="0" cy="0" r="5" fill="#e6edf3" />

    <!-- Root trunk (horizontal) -->
    <line x1="5" y1="0" x2="50" y2="0" stroke="#e6edf3" stroke-width="2.5" opacity="0.4" />

    <!-- First split: vertical line at x=50 -->
    <line x1="50" y1="-95" x2="50" y2="105" stroke="#e6edf3" stroke-width="2" opacity="0.3" />

    <!-- ═══ UPPER BRANCH (hooks + skills) ═══ -->
    <!-- Horizontal to second split -->
    <line x1="50" y1="-95" x2="130" y2="-95" stroke="#e6edf3" stroke-width="2" opacity="0.3" />
    <!-- Second split: vertical -->
    <line x1="130" y1="-155" x2="130" y2="-30" stroke="#e6edf3" stroke-width="1.5" opacity="0.25" />

    <!-- ── HOOKS branch (green) ── -->
    <line x1="130" y1="-155" x2="220" y2="-155" stroke="#7ee787" stroke-width="2" opacity="0.6" />
    <!-- hooks split vertical -->
    <line x1="220" y1="-180" x2="220" y2="-130" stroke="#7ee787" stroke-width="1.5" opacity="0.4" />
    <!-- h1 -->
    <line x1="220" y1="-180" x2="310" y2="-180" stroke="#7ee787" stroke-width="1.2" opacity="0.35" />
    <circle cx="310" cy="-180" r="2.5" fill="#7ee787" opacity="0.7" />
    <!-- h2 -->
    <line x1="220" y1="-155" x2="310" y2="-155" stroke="#7ee787" stroke-width="1.2" opacity="0.35" />
    <circle cx="310" cy="-155" r="2" fill="#7ee787" opacity="0.55" />
    <!-- h3 -->
    <line x1="220" y1="-130" x2="310" y2="-130" stroke="#7ee787" stroke-width="1.2" opacity="0.35" />
    <circle cx="310" cy="-130" r="1.5" fill="#7ee787" opacity="0.4" />
    <!-- hooks main node -->
    <circle cx="220" cy="-155" r="4" fill="#7ee787" />

    <!-- ── SKILLS branch (blue) ── -->
    <line x1="130" y1="-30" x2="220" y2="-30" stroke="#79c0ff" stroke-width="2" opacity="0.55" />
    <!-- skills split vertical -->
    <line x1="220" y1="-65" x2="220" y2="10" stroke="#79c0ff" stroke-width="1.5" opacity="0.35" />
    <!-- s1 -->
    <line x1="220" y1="-65" x2="330" y2="-65" stroke="#79c0ff" stroke-width="1.2" opacity="0.3" />
    <circle cx="330" cy="-65" r="2.5" fill="#79c0ff" opacity="0.6" />
    <!-- s2 -->
    <line x1="220" y1="-40" x2="330" y2="-40" stroke="#79c0ff" stroke-width="1.2" opacity="0.3" />
    <circle cx="330" cy="-40" r="2" fill="#79c0ff" opacity="0.5" />
    <!-- s3 -->
    <line x1="220" y1="-15" x2="330" y2="-15" stroke="#79c0ff" stroke-width="1.2" opacity="0.3" />
    <circle cx="330" cy="-15" r="2" fill="#79c0ff" opacity="0.45" />
    <!-- s4 -->
    <line x1="220" y1="10" x2="330" y2="10" stroke="#79c0ff" stroke-width="1.2" opacity="0.3" />
    <circle cx="330" cy="10" r="1.5" fill="#79c0ff" opacity="0.35" />
    <!-- skills main node -->
    <circle cx="220" cy="-30" r="5" fill="#79c0ff" />

    <!-- ═══ LOWER BRANCH (agents + orchestrator) ═══ -->
    <!-- Horizontal to third split -->
    <line x1="50" y1="105" x2="130" y2="105" stroke="#e6edf3" stroke-width="2" opacity="0.3" />
    <!-- Third split: vertical -->
    <line x1="130" y1="65" x2="130" y2="150" stroke="#e6edf3" stroke-width="1.5" opacity="0.25" />

    <!-- ── AGENTS branch (orange) ── -->
    <line x1="130" y1="65" x2="220" y2="65" stroke="#f0883e" stroke-width="2" opacity="0.5" />
    <!-- agents split vertical -->
    <line x1="220" y1="45" x2="220" y2="85" stroke="#f0883e" stroke-width="1.5" opacity="0.3" />
    <!-- a1 -->
    <line x1="220" y1="45" x2="310" y2="45" stroke="#f0883e" stroke-width="1.2" opacity="0.3" />
    <circle cx="310" cy="45" r="2" fill="#f0883e" opacity="0.55" />
    <!-- a2 -->
    <line x1="220" y1="85" x2="310" y2="85" stroke="#f0883e" stroke-width="1.2" opacity="0.3" />
    <circle cx="310" cy="85" r="1.5" fill="#f0883e" opacity="0.4" />
    <!-- agents main node -->
    <circle cx="220" cy="65" r="4" fill="#f0883e" />

    <!-- ── ORCHESTRATOR branch (purple) ── -->
    <line x1="130" y1="150" x2="220" y2="150" stroke="#d2a8ff" stroke-width="1.8" opacity="0.45" />
    <!-- orchestrator split vertical -->
    <line x1="220" y1="135" x2="220" y2="170" stroke="#d2a8ff" stroke-width="1.2" opacity="0.25" />
    <!-- o1 -->
    <line x1="220" y1="135" x2="310" y2="135" stroke="#d2a8ff" stroke-width="1" opacity="0.25" />
    <circle cx="310" cy="135" r="1.5" fill="#d2a8ff" opacity="0.4" />
    <!-- o2 -->
    <line x1="220" y1="170" x2="310" y2="170" stroke="#d2a8ff" stroke-width="1" opacity="0.25" />
    <circle cx="310" cy="170" r="1.5" fill="#d2a8ff" opacity="0.35" />
    <!-- orchestrator main node -->
    <circle cx="220" cy="150" r="3.5" fill="#d2a8ff" />
  </g>

  <!-- Title -->
  <text x="100" y="235" fill="#e6edf3" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="76" letter-spacing="-1.5">Clade</text>

  <!-- Tagline -->
  <text x="104" y="290" fill="#8b949e" font-family="Helvetica, Arial, sans-serif" font-weight="400" font-size="22" letter-spacing="3">AUTONOMOUS CODING, EVOLVED</text>

  <!-- Stats row -->
  <circle cx="110" cy="348" r="5" fill="#79c0ff" />
  <text x="124" y="354" fill="#79c0ff" font-family="Helvetica, Arial, sans-serif" font-weight="600" font-size="19">29 Skills</text>

  <circle cx="268" cy="348" r="5" fill="#7ee787" />
  <text x="282" y="354" fill="#7ee787" font-family="Helvetica, Arial, sans-serif" font-weight="600" font-size="19">14 Hooks</text>

  <circle cx="418" cy="348" r="5" fill="#f0883e" />
  <text x="432" y="354" fill="#f0883e" font-family="Helvetica, Arial, sans-serif" font-weight="600" font-size="19">5 Agents</text>

  <circle cx="558" cy="348" r="5" fill="#d2a8ff" />
  <text x="572" y="354" fill="#d2a8ff" font-family="Helvetica, Arial, sans-serif" font-weight="600" font-size="19">MCP Server</text>

  <!-- Install box -->
  <rect x="100" y="390" width="400" height="46" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1" />
  <text x="120" y="420" fill="#8b949e" font-family="Consolas, 'Liberation Mono', monospace" font-size="16">$</text>
  <text x="140" y="420" fill="#c9d1d9" font-family="Consolas, 'Liberation Mono', monospace" font-size="16">pip install clade-mcp</text>

  <!-- Bottom tagline -->
  <text x="100" y="490" fill="#484f58" font-family="Helvetica, Arial, sans-serif" font-weight="400" font-size="16">Turn Claude Code from a chat assistant into an autonomous coding system</text>
</svg>
