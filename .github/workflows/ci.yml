name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check
        run: |
          echo "Checking Python syntax..."
          find orchestrator/ -name "*.py" | while read f; do
            python -m py_compile "$f" && echo "OK: $f" || exit 1
          done

      - name: Shell syntax check (hooks)
        run: |
          echo "Checking shell syntax..."
          find configs/hooks/ -name "*.sh" | while read f; do
            bash -n "$f" && echo "OK: $f" || exit 1
          done

      - name: Shell syntax check (scripts)
        run: |
          find configs/scripts/ -name "*.sh" | while read f; do
            bash -n "$f" && echo "OK: $f" || exit 1
          done

      - name: Install test (dry run)
        run: |
          chmod +x install.sh
          bash -n install.sh && echo "install.sh syntax OK"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run unit tests
        run: |
          cd tests
          python -m pytest test_loop_system.py -x --timeout=30 -v \
            --ignore-glob="*integration*" \
            -k "not integration" \
            || echo "::warning::Some tests failed — see output above"
        continue-on-error: true
