name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Python syntax check
        run: |
          echo "Checking Python syntax..."
          find orchestrator/ -name "*.py" | while read f; do
            python -m py_compile "$f" && echo "OK: $f" || exit 1
          done

      - name: Shell syntax check (hooks)
        run: |
          echo "Checking shell syntax..."
          find configs/hooks/ -name "*.sh" | while read f; do
            bash -n "$f" && echo "OK: $f" || exit 1
          done

      - name: Shell syntax check (scripts)
        run: |
          find configs/scripts/ -name "*.sh" | while read f; do
            bash -n "$f" && echo "OK: $f" || exit 1
          done

      - name: Install test (dry run)
        run: |
          chmod +x install.sh
          bash -n install.sh && echo "install.sh syntax OK"

  pytest:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd orchestrator
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          cd orchestrator
          python -m pytest tests/ -v

  shell-tests:
    name: Shell Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Run loop system tests
        run: |
          if [[ -f tests/test-loop.sh ]]; then
            bash tests/test-loop.sh || echo "::warning::Some tests failed — see output above"
          else
            echo "No shell tests found, skipping"
          fi
        continue-on-error: true
