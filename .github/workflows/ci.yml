name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Python syntax check
        run: |
          echo "Checking Python syntax..."
          find orchestrator/ -name "*.py" | while read f; do
            python -m py_compile "$f" && echo "OK: $f" || exit 1
          done

      - name: Shell syntax check (hooks)
        run: |
          echo "Checking shell syntax..."
          find configs/hooks/ -name "*.sh" | while read f; do
            bash -n "$f" && echo "OK: $f" || exit 1
          done

      - name: Shell syntax check (scripts)
        run: |
          find configs/scripts/ -name "*.sh" | while read f; do
            bash -n "$f" && echo "OK: $f" || exit 1
          done

      # Same script committer.sh runs locally before every commit — one gate,
      # shared local/CI (checks.sh skips silently when shellcheck is missing,
      # so install it explicitly to keep this a hard gate here)
      - name: Shellcheck gate (shared checks.sh)
        run: |
          command -v shellcheck >/dev/null || sudo apt-get install -y shellcheck
          bash configs/scripts/checks.sh shellcheck configs/hooks/*.sh configs/scripts/*.sh install.sh

      - name: Install test (dry run)
        run: |
          chmod +x install.sh
          bash -n install.sh && echo "install.sh syntax OK"

      - name: Validate skill registry
        run: python3 configs/scripts/validate-skills.py configs/skills

  pytest:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd orchestrator
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          cd orchestrator
          python -m pytest tests/ -v

  shell-tests:
    name: Shell Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # Hard gate: a failing shell test fails the build (no continue-on-error,
      # no warning-swallow — that combination hid 11 real failures for weeks)
      - name: Run loop system tests
        run: bash tests/test-loop.sh

      # Commit-path gate: checks.sh secret scan + committer.sh wiring
      - name: Run commit-path checks tests
        run: bash tests/test-checks.sh

      # Nth-strike escalation: 3+-hit rules become REQUIRED hook conversions
      - name: Run auto-audit escalation tests
        run: bash tests/test-audit.sh

  install-test:
    name: Install Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # Executes install.sh against a throwaway $HOME under /tmp and asserts
      # what it ships: hooks executable, skill catalog generated, learned
      # Cross-Project Rules surviving reinstall, settings merge, symlinks
      - name: Run install test
        run: bash tests/test-install.sh
