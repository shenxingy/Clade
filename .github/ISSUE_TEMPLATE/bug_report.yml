name: Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run X, it does Y instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Exact steps to reliably reproduce the bug.
      placeholder: |
        1. Install with ./install.sh
        2. Open a new Claude Code session
        3. Run /batch-tasks
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - install.sh (automatic)
        - Manual (copied files)
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14.3 / Ubuntu 22.04 / Windows WSL2"
    validations:
      required: true

  - type: input
    id: claude-version
    attributes:
      label: Claude Code version
      description: Run `claude --version` to get this.
      placeholder: "1.0.x"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any relevant terminal output. This will be automatically formatted as code.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that might be relevant (hook output, settings, etc.)
    validations:
      required: false
